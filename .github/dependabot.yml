# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://help.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "pip" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
      time: "13:00"
      day: "monday"
      timezone: "America/Toronto"
    assignees:
      - "alexander0042"
    groups:
      non-major-versions: # the name of the group
        update-types:     # the key used to specify the semver level to include in the group
        - "minor"         # an array, possible values being minor, patch and major
        - "patch"
    ignore:
      # Dependabot should not update numpy and eccodes
      - dependency-name: "numpy"
      - dependency-name: "eccodes"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "13:00"
      day: "monday"
      timezone: "America/Toronto"
    groups:
      non-major-versions: # the name of the group
        update-types:     # the key used to specify the semver level to include in the group
        - "minor"         # an array, possible values being minor, patch and major
        - "patch"
  - package-ecosystem: "docker"
    directory: "/Docker"
    schedule:
      interval: "monthly"
      time: "13:00"
      timezone: "America/Toronto"
    cooldown:
      # Delay updates for approximately 90 days (which is the maximum)
      semver-major-days: 90
    assignees:
      - "alexander0042"
    open-pull-requests-limit: 100
