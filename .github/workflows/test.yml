name: Tests

on:
  pull_request:
    branches: ['dev']
  push:
    branches-ignore: ['dev']
jobs:
  pytest:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Docker/requirements-api.txt
          pip install pytest pytest-asyncio
      - name: Run pytest
        env:
          PW_API: ${{ secrets.PW_API }}
        run: pytest -q --ignore=tests/test_rtma_ingest.py --ignore=tests/test_hrrr_6h_ingest.py --ignore=tests/test_dwd_interp_flow.py --ignore=tests/test_interpolate_nan_along_axis.py --ignore=tests/test_historic_archive_extract.py --ignore=tests/test_ingest_utils_download_retry.py
