    command: ["API/ECMWF_Local_Ingest.py"]
    depends_on:
      gfs_ingest:
        condition: service_completed_successfully
      nbm_ingest:
        condition: service_completed_successfully
      subh_ingest:
        condition: service_completed_successfully
      nbm_fire_ingest:
        condition: service_completed_successfully
      gefs_ingest:
        condition: service_completed_successfully

  # RTMA-RU Ingest
  rtma-ru_ingest:
    <<: *dns_defaults
    container_name: pirate-ingest-rtma-ru
    image: pirateingest:latest
    volumes:
      - ${PW_WEATHER_ROOT:-/mnt/pirate-weather/Weather}:/data
