      forecast_path: "/data/Prod/SubH"
      historic_path: "/data/Hist/SubH"
      save_type: "Download"
      zarr_store_workers: "1"
      zarr_async_concurrency: "1"
    command: ["API/SubH_Local_Ingest.py"]
    depends_on:
      gfs_ingest:
        condition: service_completed_successfully
      nbm_ingest:
        condition: service_completed_successfully      

  # GEFS Ingest
  gefs_ingest:
    <<: *dns_defaults
    container_name: pirate-ingest-gefs
    image: pirateingest:latest
    volumes:
      - ${PW_WEATHER_ROOT:-/mnt/pirate-weather/Weather}:/data
      - ${PW_WORK_ROOT:-/mnt/pirate-weather/Work}:/tmp
    environment:
      wgrib2_path: "/build/wgrib2_build/bin/wgrib2 "
      forecast_process_dir: "/tmp/Process/GEFS"
      forecast_path: "/data/Prod/GEFS"
      historic_path: "/data/Hist/GEFS"
      save_type: "Download"
      zarr_store_workers: "1"
      zarr_async_concurrency: "1"
    command: ["API/GEFS_Local_Ingest.py"]
    depends_on:
      gfs_ingest:
        condition: service_completed_successfully
      nbm_ingest:
        condition: service_completed_successfully      
      subh_ingest:
        condition: service_completed_successfully
      nbm_fire_ingest:
        condition: service_completed_successfully        

  # HRRR Ingest
  hrrr_ingest:
    <<: *dns_defaults
    container_name: pirate-ingest-hrrr
    image: pirateingest:latest
    volumes:
      - ${PW_WEATHER_ROOT:-/mnt/pirate-weather/Weather}:/data
      - ${PW_WORK_ROOT:-/mnt/pirate-weather/Work}:/tmp
    environment:
      wgrib2_path: "/build/wgrib2_build/bin/wgrib2 "
      forecast_process_dir: "/tmp/Process/HRRR"
      forecast_path: "/data/Prod/HRRR"
      historic_path: "/data/Hist/HRRR"
      save_type: "Download"
      zarr_store_workers: "1"
      zarr_async_concurrency: "1"
    command: ["API/HRRR_Local_Ingest.py"]
    depends_on:
      gfs_ingest:
        condition: service_completed_successfully
      nbm_ingest:
        condition: service_completed_successfully      
      subh_ingest:
        condition: service_completed_successfully
      nbm_fire_ingest:
        condition: service_completed_successfully 
      gefs_ingest:
        condition: service_completed_successfully                  
      
  # HRRR 6H Ingest
  hrrr_6h_ingest:
    <<: *dns_defaults
    container_name: pirate-ingest-hrrr6h
    image: pirateingest:latest
    volumes:
      - ${PW_WEATHER_ROOT:-/mnt/pirate-weather/Weather}:/data
      - ${PW_WORK_ROOT:-/mnt/pirate-weather/Work}:/tmp
    environment:
      wgrib2_path: "/build/wgrib2_build/bin/wgrib2 "
      forecast_process_dir: "/tmp/Process/HRRR_6H"
      forecast_path: "/data/Prod/HRRR_6H"
      historic_path: "/data/Hist/HRRR_6H"
      save_type: "Download"
      zarr_store_workers: "1"
      zarr_async_concurrency: "1"
    command: ["API/HRRR_6H_Local_Ingest.py"]
    depends_on:
      gfs_ingest:
        condition: service_completed_successfully
      nbm_ingest:
        condition: service_completed_successfully      
      subh_ingest:
        condition: service_completed_successfully
      nbm_fire_ingest:
        condition: service_completed_successfully 
      gefs_ingest:
        condition: service_completed_successfully       

  # NWS Alerts Ingest
  nws_alerts_ingest:
    <<: *dns_defaults
    container_name: pirate-ingest-nws-alerts
    image: pirateingest:latest
    volumes:
      - ${PW_WEATHER_ROOT:-/mnt/pirate-weather/Weather}:/data
      - ${PW_WORK_ROOT:-/mnt/pirate-weather/Work}:/tmp
    environment:
      wgrib2_path: "/build/wgrib2_build/bin/wgrib2 "
      forecast_process_dir: "/tmp/Process/NWS_Alerts"
      forecast_path: "/data/Prod/NWS_Alerts"
      historic_path: "/data/Hist/NWS_Alerts"
      save_type: "Download"
      zarr_store_workers: "1"
      zarr_async_concurrency: "1"
    command: ["API/NWS_Alerts_Local.py"]
    depends_on:
      gfs_ingest:
        condition: service_completed_successfully
      nbm_ingest:
        condition: service_completed_successfully      
      subh_ingest:
        condition: service_completed_successfully
      nbm_fire_ingest:
        condition: service_completed_successfully 
      gefs_ingest:
        condition: service_completed_successfully

  # ECMWF Ingest
  ecmwf_ingest:
    <<: *dns_defaults
    container_name: pirate-ingest-ecmwf
    image: pirateingest:latest
    volumes:
      - ${PW_WEATHER_ROOT:-/mnt/pirate-weather/Weather}:/data
